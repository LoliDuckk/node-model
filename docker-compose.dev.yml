# Docker configuration for development

version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: user-management-db-dev
    environment:
      POSTGRES_DB: user_management_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user-management-network

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: user-management-app-dev
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: user_management_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET_KEY: dev_secret_key_change_in_production
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Admin Admin Admin}
      ADMIN_BIRTHDAY: ${ADMIN_BIRTHDAY:-1970-01-01}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - user-management-network
    command: sh -c "npm run db:migrate && npm run dev"

volumes:
  postgres_data_dev:

networks:
  user-management-network:
    driver: bridge
