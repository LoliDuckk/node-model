version: "3.8"

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: user-management-db
    environment:
      POSTGRES_DB: ${DB_NAME:-user_management}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - user-management-network

  # Node.js приложение
  app:
    build: .
    container_name: user-management-app
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-user_management}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your_secret_key_here}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Admin Admin Admin}
      ADMIN_BIRTHDAY: ${ADMIN_BIRTHDAY:-1970-01-01}
      API_URL: http://localhost:5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && node index.js"
    volumes:
      - ./logs:/app/logs
    networks:
      - user-management-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  user-management-network:
    driver: bridge
